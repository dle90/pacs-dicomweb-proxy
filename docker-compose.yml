services:
  dicomweb-proxy:
    # Auth build (OpenResty + JWT verifier). Verifier no-ops while AUTH_ENABLED=false,
    # so dev viewing still passes through — but HIS is configured + ready.
    # Build from the repo root so auth/Dockerfile's root-relative COPYs resolve
    # (mirrors Railway: root context + dockerfilePath=auth/Dockerfile).
    build:
      context: .
      dockerfile: auth/Dockerfile
    image: medisync-dicomweb-proxy
    container_name: medisync-dicomweb-proxy
    ports:
      - "8080:80"
    environment:
      # Reach Orthanc over the shared dev network by service name.
      ORTHANC_BACKEND_URL: "http://orthanc:8042"

      # ── Auth (2 sources: HIS now, Telerad later) ──────────────────────────
      # Policy: READ (GET/HEAD WADO/QIDO) = public; WRITE (STOW POST/PUT/DELETE) =
      # require valid token. So the viewer reads without a token, but receiving
      # DICOM (STOW) needs a HIS token.
      AUTH_ENABLED: "true"

      # ── ĐỌC CA (read) security ─────────────────────────────────────────────
      # true: WADO/QIDO yêu cầu VIEW token bind đúng studyUid (token.studyUid ==
      # study trong URL). false = đọc public. ⚠ Viewer PHẢI gửi Bearer view-token,
      # nếu không reads → 401. Tắt (false) nếu viewer chưa gửi token.
      READ_AUTH_ENABLED: "true"
      # aud mong đợi của view token (trống = không kiểm aud; vẫn kiểm sig/exp/iss/study):
      # READ_JWT_AUDIENCE: "PACS-VIEWER"

      # HIS token source (config variables — non-secret public key, not baked).
      HIS_JWT_ISSUER: "HIS"
      HIS_JWT_AUDIENCE: "LOCAL-GATEWAY-SERVER"   # token STOW của gateway (LGS)
      HIS_JWT_PUBLIC_KEY: |
        -----BEGIN PUBLIC KEY-----
        MIIBITANBgkqhkiG9w0BAQEFAAOCAQ4AMIIBCQKCAQBlmtoQxJgsQzx/5ZUWDZ2v
        UiGYskDiAA+UiSid5Ql9r+F23OqvPCDtcl2YEZ4+tF15PBYWuk6hXSmkqm8x47x6
        Te9XMR7sqxNDlOL2rP6E7U7zVosd0oWr8voQKDSsws146iaMEA0rl09lkTfQgElu
        yRdtXrmC+lGtce5Q7IlVLMF0BSz3VUrEAFFgVRJa8n27oi2UBfDqYJR9NzHsMzWp
        4fTW2iY0qYiRwk6N2SHvlIAfZnOGFP158lU9VoCNk8xK59gW4M6ukCmtCGRhH/ZB
        OMzHwz9qdszRlg2bzPdjYUH1BmcgfeF8GeNeRKMkm1uR+7ECBdjHFEhxCqPjlII7
        AgMBAAE=
        -----END PUBLIC KEY-----

      # Telerad token source — view-token đọc ca do telerad-core phát hành (iss=TELERAD).
      # Verify bằng public key của telerad-core. Telerad không STOW nên audience để trống.
      TELERAD_JWT_ISSUER: "TELERAD"
      TELERAD_JWT_AUDIENCE: ""
      TELERAD_JWT_PUBLIC_KEY: |
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAjg/uWBMNK2brRtU5iIRp
        uDKkVkQ92KrAnXcEeHEG7iRA+X0OaMwXxfMEYp6wwrbGkEDA6EMzFg48seZpNGkU
        vp00u6weo8q9H2nil0JCpKQdMRQbEgiL+FGrOACWWOGRpKpYd8DSGXmsqf+AenqC
        7nf6fssTY2C/fDGuK4KkcVYpr/JqX0LGB7PNnACuaxdhkQKjh62u8jPWNsyQlF0x
        MkSoeEjLTNchVzyZ7w/NtvGJvxSqwJRChzwBwr28yCPIr3vWVLqkoUrM6d+AdWss
        0sYrPjaylOrfoxhuZO4T91sG0Xh4cU4Lqlduab+SB/PJnH1fAe7SxljxYVr/yHAH
        8wIDAQAB
        -----END PUBLIC KEY-----
    networks:
      - medisync-pacs
    restart: unless-stopped

# Shared dev network created by the pacs repo:
#   docker network create medisync-pacs
# Bring up `pacs` first (provides `orthanc`), then this proxy.
networks:
  medisync-pacs:
    name: medisync-pacs
    external: true

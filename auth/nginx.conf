# Full OpenResty config for pacs-dicomweb-proxy.
# ${ORTHANC_BACKEND_URL} is substituted at startup (docker-entrypoint.sh).
worker_processes auto;
error_log  /dev/stderr  notice;
pid        /usr/local/openresty/nginx/logs/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  access_log    /dev/stdout;
  sendfile      on;
  server_tokens off;

  # Lua module path: our scripts in /etc/nginx/lua + default search path (`;;`)
  # so opm-installed libs (resty.jwt, resty.jwt-validators) resolve.
  lua_package_path "/etc/nginx/lua/?.lua;;";
  lua_code_cache   on;

  # Cosocket DNS: medisync_label's resty.http resolves the backend hostname
  # (e.g. "orthanc") at runtime. Unlike proxy_pass, cosockets need an explicit
  # resolver. 127.0.0.11 = Docker's embedded DNS on the user-defined network.
  resolver 127.0.0.11 ipv6=off valid=30s;
  resolver_timeout 5s;

  server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # ─────────────────────────────────────────────────────────────────────────
    # DICOMweb auth/policy proxy in front of Orthanc.
    #
    # Orthanc stays PRIVATE — this is the only ingress for WADO-RS / QIDO-RS /
    # STOW-RS. `${ORTHANC_BACKEND_URL}` substituted at start.
    #
    # AUTH: `access_by_lua` -> medisync_auth.verify() runs before proxying. Gated
    # by AUTH_ENABLED (env). Current policy:
    #   • READ  (GET/HEAD: WADO-RS/QIDO-RS)  = PUBLIC, no token ("đọc ca").
    #   • WRITE (POST/PUT/DELETE: STOW etc.) = require a valid token (RS256) from
    #     one of TWO sources (HIS/Telerad), routed by `iss` ("nhận DICOM").
    # Each source's key + issuer + audience are config variables (HIS_JWT_* /
    # TELERAD_JWT_*), materialized per source. Write path does NOT bind studyUid.
    # ─────────────────────────────────────────────────────────────────────────

    # Per-instance DICOM bytes — SOPInstanceUID is immutable by DICOM spec, so
    # pixel/metadata never change → safe to cache forever in the browser.
    # Matches /wado/studies/<UID>/series/<UID>/instances/<UID>[/frames/<N>].
    location ~ ^/wado/studies/[^/]+/series/[^/]+/instances/[^/]+(?:/frames/[^/]+)?/?$ {
      access_by_lua_block { require("medisync_auth").verify() }
      proxy_pass ${ORTHANC_BACKEND_URL};
      proxy_set_header X-Real-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify off;
      add_header Access-Control-Allow-Origin *;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
      add_header Access-Control-Allow-Headers "Content-Type, Accept, Authorization";
      add_header Cross-Origin-Resource-Policy cross-origin;
      add_header Cache-Control "public, max-age=31536000, immutable";
      if ($request_method = OPTIONS) { return 204; }
    }

    # WADO-RS / QIDO-RS (read) + STOW-RS (write, POST /wado/studies).
    # Host header: rely on nginx default — cloud edges that route by Host would
    # loop back to this proxy if we set $host (→ 502).
    location /wado/ {
      access_by_lua_block { require("medisync_auth").verify() }
      # Post-STOW tenant labeling (built from the JWT, applied async to Orthanc).
      # capture_body() only buffers when the request was flagged a STOW (POST
      # .../studies), so WADO/QIDO GET responses stream through untouched.
      body_filter_by_lua_block { require("medisync_label").capture_body() }
      log_by_lua_block         { require("medisync_label").schedule() }
      proxy_pass ${ORTHANC_BACKEND_URL}/wado/;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_ssl_server_name on;
      proxy_ssl_verify off;
      # STOW uploads can be a whole study — allow large bodies and STREAM the
      # request (don't buffer GB to RAM/disk). Keeps the proxy light.
      client_max_body_size 2g;
      proxy_request_buffering off;
      proxy_http_version 1.1;
      proxy_read_timeout 600s;
      add_header Access-Control-Allow-Origin *;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
      add_header Access-Control-Allow-Headers "Content-Type, Accept, Authorization";
      add_header Cross-Origin-Resource-Policy cross-origin;
      if ($request_method = OPTIONS) { return 204; }
    }

    # WADO-URI
    location = /wado {
      access_by_lua_block { require("medisync_auth").verify() }
      proxy_pass ${ORTHANC_BACKEND_URL}/wado;
      proxy_ssl_server_name on;
      proxy_ssl_verify off;
      add_header Access-Control-Allow-Origin *;
    }

    # Health probe for LB / monitoring (no auth)
    location = /healthz {
      add_header Content-Type text/plain;
      return 200 'ok';
    }
  }
}

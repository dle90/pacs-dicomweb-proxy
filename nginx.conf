server {
  listen 80 default_server;
  listen [::]:80 default_server;

  # ───────────────────────────────────────────────────────────────────────────
  # DICOMweb proxy in front of Orthanc (DEV / no-auth).
  #
  # Orthanc stays private — this is the ingress for WADO-RS / QIDO-RS / STOW-RS.
  # `${ORTHANC_BACKEND_URL}` is substituted at startup (docker-entrypoint.sh).
  #
  # Upstream is resolved PER REQUEST: proxy_pass uses the $orthanc variable + a
  # resolver, so nginx re-resolves `pacs.railway.internal` on every request.
  # This avoids two failure modes of nginx's default startup-time resolution on
  # Railway: (1) nginx refusing to start ("host not found in upstream") when pacs
  # is briefly down while it (re)deploys, and (2) holding a stale private IP after
  # pacs redeploys to a new address. ${RESOLVER} is the container's own DNS,
  # injected by docker-entrypoint.sh.
  #
  # NOTE: JWT verification is intentionally NOT here yet — the working verifier
  # (OpenResty + lua-resty-jwt, RS256 + studyUid binding) is parked in ./auth/.
  # Swap it in when ready (see auth/README.md).
  # ───────────────────────────────────────────────────────────────────────────
  resolver ${RESOLVER} valid=10s;
  resolver_timeout 5s;
  set $orthanc "${ORTHANC_BACKEND_URL}";

  # Per-instance DICOM bytes — SOPInstanceUID is immutable by DICOM spec, so
  # pixel/metadata never change → safe to cache forever in the browser.
  # Matches /wado/studies/<UID>/series/<UID>/instances/<UID>[/frames/<N>].
  location ~ ^/wado/studies/[^/]+/series/[^/]+/instances/[^/]+(?:/frames/[^/]+)?/?$ {
    proxy_pass $orthanc$request_uri;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type, Accept, Authorization";
    # CORP cross-origin: the OHIF page runs under COEP: require-corp.
    add_header Cross-Origin-Resource-Policy cross-origin;
    add_header Cache-Control "public, max-age=31536000, immutable";
    if ($request_method = OPTIONS) { return 204; }
  }

  # WADO-RS / QIDO-RS (read) + STOW-RS (write, POST /wado/studies).
  # Host header: rely on nginx default — cloud edges that route by Host would
  # loop back to this proxy if we set $host (→ 502).
  location /wado/ {
    proxy_pass $orthanc$request_uri;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    # STOW uploads can be a whole study — allow large bodies and STREAM the
    # request (don't buffer GB to RAM/disk).
    client_max_body_size 2g;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_read_timeout 600s;
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type, Accept, Authorization";
    add_header Cross-Origin-Resource-Policy cross-origin;
    if ($request_method = OPTIONS) { return 204; }
  }

  # WADO-URI
  location = /wado {
    proxy_pass $orthanc$request_uri;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    add_header Access-Control-Allow-Origin *;
  }

  # Health probe for LB / monitoring
  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }
}
